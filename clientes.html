<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Sistema de Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #e9f5ee;
      --surface: #e9f5ee;
      --text-primary: #1f3d2b;
      --text-secondary: #4b6b5a;
      --accent: #22c55e;
      --accent-light: #4ade80;
      --accent-dark: #16a34a;
      --shadow-light: #ffffff;
      --shadow-dark: #c9e2d4;
      --danger: #dc2626;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding-bottom: 50px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .back-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      cursor: pointer;
      font-size: 24px;
      box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn:active {
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      cursor: pointer;
      font-size: 22px;
      box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:active {
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--surface);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .stat-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Search Section */
    .search-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .search-box {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-secondary);
    }

    #searchInput {
      width: 100%;
      padding: 15px 18px 15px 50px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 
        inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
    }

    #searchInput:focus {
      outline: none;
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light),
        0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    /* Form Card */
    .form-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .form-header {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(34, 197, 94, 0.2);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 
        inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light),
        0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 16px;
      border: none;
      border-radius: 15px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      box-shadow: 
        8px 8px 16px var(--shadow-dark),
        -8px -8px 16px var(--shadow-light);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--danger);
      box-shadow: 
        8px 8px 16px var(--shadow-dark),
        -8px -8px 16px var(--shadow-light);
      display: none;
    }

    .btn-secondary.active {
      display: flex;
    }

    .btn-secondary:active {
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    /* Clientes Grid */
    .clientes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      list-style: none;
    }

    .cliente-card {
      background: var(--surface);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
      transition: all 0.3s;
    }

    .cliente-card:hover {
      transform: translateY(-5px);
      box-shadow: 
        15px 15px 30px var(--shadow-dark),
        -15px -15px 30px var(--shadow-light);
    }

    .cliente-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(34, 197, 94, 0.2);
    }

    .cliente-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
    }

    .cliente-nombre {
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
      flex: 1;
      margin-left: 15px;
    }

    .cliente-info {
      margin-top: 15px;
    }

    .cliente-info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      padding: 10px;
      background: var(--surface);
      border-radius: 10px;
      box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
    }

    .info-icon {
      font-size: 16px;
      color: var(--accent);
    }

    .cliente-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-edit, .btn-delete {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
    }

    .btn-edit {
      background: var(--surface);
      color: var(--accent);
    }

    .btn-delete {
      background: var(--surface);
      color: var(--danger);
    }

    .btn-edit:active, .btn-delete:active {
      box-shadow: 
        inset 2px 2px 4px var(--shadow-dark),
        inset -2px -2px 4px var(--shadow-light);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 18px;
      font-weight: 600;
    }

    /* FAB Button */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      cursor: pointer;
      font-size: 28px;
      color: white;
      box-shadow: 
        0 10px 30px rgba(34, 197, 94, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .fab:hover {
      transform: scale(1.1) rotate(90deg);
    }

    .fab:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      .header-title {
        font-size: 20px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .btn-group {
        grid-template-columns: 1fr;
      }

      .clientes-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <h1 class="header-title">
        <span>👥</span>
        <span>Clientes</span>
      </h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="exportarClientes()">📊</button>
        <button class="icon-btn" onclick="importarClientes()">📥</button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="stats"></div>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Buscar clientes por nombre, teléfono o email..."
          oninput="filtrarClientes()"
        >
      </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
      <div class="form-header">
        <span>✏️</span>
        <span id="formTitle">Nuevo Cliente</span>
      </div>
      
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre</label>
          <input id="nombre" placeholder="Nombre completo" required>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input id="telefono" placeholder="0999999999">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="cliente@email.com">
        </div>
        <div class="form-group">
          <label>Dirección</label>
          <input id="direccion" placeholder="Dirección completa">
        </div>
      </div>

      <div class="btn-group">
        <button class="btn-primary" onclick="guardarCliente()">
          <span>💾</span>
          <span>Guardar</span>
        </button>
        <button class="btn-secondary" id="btnCancel" onclick="cancelar()">
          <span>✕</span>
          <span>Cancelar</span>
        </button>
      </div>
    </div>

    <!-- Clientes List -->
    <ul class="clientes-grid" id="lista"></ul>
  </div>

  <!-- FAB Button -->
  <button class="fab" onclick="scrollToForm()">✏️</button>

  <script>
    let clientes = [];
    let editandoIndex = -1;

    function guardarCliente() {
      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const email = document.getElementById('email').value.trim();
      const direccion = document.getElementById('direccion').value.trim();

      if (!nombre) {
        alert('⚠️ Por favor ingrese un nombre');
        return;
      }

      const cliente = { nombre, telefono, email, direccion };

      if (editandoIndex >= 0) {
        // Editar cliente existente
        clientes[editandoIndex] = cliente;
        editandoIndex = -1;
        document.getElementById('formTitle').textContent = 'Nuevo Cliente';
        document.getElementById('btnCancel').classList.remove('active');
      } else {
        // Agregar nuevo cliente
        clientes.push(cliente);
      }

      limpiarFormulario();
      render();
      
      // Guardar en localStorage
      localStorage.setItem('clientes', JSON.stringify(clientes));
    }

    function editarCliente(index) {
      editandoIndex = index;
      const cliente = clientes[index];
      
      document.getElementById('nombre').value = cliente.nombre;
      document.getElementById('telefono').value = cliente.telefono;
      document.getElementById('email').value = cliente.email;
      document.getElementById('direccion').value = cliente.direccion;
      
      document.getElementById('formTitle').textContent = 'Editar Cliente';
      document.getElementById('btnCancel').classList.add('active');
      
      // Scroll al formulario
      document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
    }

    function eliminarCliente(index) {
      if (confirm(`¿Eliminar a ${clientes[index].nombre}?`)) {
        clientes.splice(index, 1);
        render();
        localStorage.setItem('clientes', JSON.stringify(clientes));
      }
    }

    function cancelar() {
      editandoIndex = -1;
      limpiarFormulario();
      document.getElementById('formTitle').textContent = 'Nuevo Cliente';
      document.getElementById('btnCancel').classList.remove('active');
    }

    function limpiarFormulario() {
      document.getElementById('nombre').value = '';
      document.getElementById('telefono').value = '';
      document.getElementById('email').value = '';
      document.getElementById('direccion').value = '';
    }

    function getInitials(nombre) {
      const words = nombre.trim().split(' ');
      if (words.length >= 2) {
        return (words[0][0] + words[1][0]).toUpperCase();
      }
      return nombre.substring(0, 2).toUpperCase();
    }

    function filtrarClientes() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const clientesFiltrados = clientes.filter(c => 
        c.nombre.toLowerCase().includes(searchTerm) ||
        c.telefono.toLowerCase().includes(searchTerm) ||
        c.email.toLowerCase().includes(searchTerm)
      );
      renderLista(clientesFiltrados);
    }

    function renderLista(clientesAMostrar) {
      const lista = document.getElementById('lista');
      
      if (clientesAMostrar.length === 0) {
        lista.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <div class="empty-text">No hay clientes registrados</div>
          </div>
        `;
        return;
      }

      lista.innerHTML = clientesAMostrar.map((c, originalIndex) => {
        // Encontrar el índice real en el array original
        const realIndex = clientes.indexOf(c);
        
        return `
          <li class="cliente-card">
            <div class="cliente-header">
              <div class="cliente-avatar">${getInitials(c.nombre)}</div>
              <div class="cliente-nombre">${c.nombre}</div>
            </div>
            <div class="cliente-info">
              ${c.telefono ? `
                <div class="cliente-info-item">
                  <span class="info-icon">📱</span>
                  <span>${c.telefono}</span>
                </div>
              ` : ''}
              ${c.email ? `
                <div class="cliente-info-item">
                  <span class="info-icon">✉️</span>
                  <span>${c.email}</span>
                </div>
              ` : ''}
              ${c.direccion ? `
                <div class="cliente-info-item">
                  <span class="info-icon">📍</span>
                  <span>${c.direccion}</span>
                </div>
              ` : ''}
            </div>
            <div class="cliente-actions">
              <button class="btn-edit" onclick="editarCliente(${realIndex})">✏️ Editar</button>
              <button class="btn-delete" onclick="eliminarCliente(${realIndex})">🗑️ Eliminar</button>
            </div>
          </li>
        `;
      }).join('');
    }

    function render() {
      // Renderizar estadísticas
      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-number">${clientes.length}</div>
          <div class="stat-label">Total Clientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✉️</div>
          <div class="stat-number">${clientes.filter(c => c.email).length}</div>
          <div class="stat-label">Con Email</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📱</div>
          <div class="stat-number">${clientes.filter(c => c.telefono).length}</div>
          <div class="stat-label">Con Teléfono</div>
        </div>
      `;

      // Renderizar lista
      renderLista(clientes);
    }

    function scrollToForm() {
      document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
      document.getElementById('nombre').focus();
    }

    function exportarClientes() {
      if (clientes.length === 0) {
        alert('⚠️ No hay clientes para exportar');
        return;
      }
      
      const dataStr = JSON.stringify(clientes, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'clientes.json';
      link.click();
      
      alert('✅ Clientes exportados correctamente');
    }

    function importarClientes() {
      alert('📥 Función de importación\n\n(Aquí se implementaría la carga de archivos JSON)');
    }

    // Cargar clientes del localStorage al iniciar
    function cargarClientes() {
      const clientesGuardados = localStorage.getItem('clientes');
      if (clientesGuardados) {
        clientes = JSON.parse(clientesGuardados);
      }
      render();
    }

    // Inicializar
    cargarClientes();
  </script>
</body>
</html>
