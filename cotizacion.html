<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotización - Sistema de Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #e9f5ee;
      --surface: #e9f5ee;
      --text-primary: #1f3d2b;
      --text-secondary: #4b6b5a;
      --accent: #22c55e;
      --accent-light: #4ade80;
      --accent-dark: #16a34a;
      --shadow-light: #ffffff;
      --shadow-dark: #c9e2d4;
      --danger: #dc2626;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .back-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      cursor: pointer;
      font-size: 24px;
      box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn:active {
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      cursor: pointer;
      font-size: 22px;
      box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-btn:active {
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff6b35;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Action Buttons Section */
    .action-buttons {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .action-card {
      flex: 1;
      background: var(--surface);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-card:active {
      transform: scale(0.98);
    }

    .action-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 28px;
      color: white;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
    }

    .action-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    /* Info Card */
    .info-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .info-row {
      margin-bottom: 20px;
    }

    .info-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .info-value.large {
      font-size: 24px;
      font-weight: 700;
    }

    /* Client Selection */
    .client-selector {
      background: var(--surface);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .client-selector label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 15px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 
        inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);
      transition: all 0.3s;
    }

    select:focus, input:focus {
      outline: none;
      box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light),
        0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    /* Product Section */
    .product-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 15px;
      margin-bottom: 20px;
    }

    .add-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 
        8px 8px 16px var(--shadow-dark),
        -8px -8px 16px var(--shadow-light);
      transition: all 0.3s;
    }

    .add-btn:hover {
      transform: translateY(-2px);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    /* Details Table */
    .details-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 
        10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(34, 197, 94, 0.2);
    }

    .details-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .details-count {
      background: var(--accent);
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .table-header {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 15px;
      padding: 12px 15px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .table-header-cell {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .table-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 15px;
      padding: 15px;
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
    }

    .table-cell {
      font-size: 15px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
    }

    .table-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: flex-end;
    }

    .btn-view, .btn-add {
      padding: 8px 20px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .btn-view {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
    }

    .btn-add {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 
        4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
    }

    /* Total Section */
    .total-section {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 
        10px 10px 30px rgba(34, 197, 94, 0.3);
      color: white;
    }

    .total-label {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .total-amount {
      font-size: 42px;
      font-weight: 700;
    }

    /* FAB Button */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      cursor: pointer;
      font-size: 28px;
      color: white;
      box-shadow: 
        0 10px 30px rgba(34, 197, 94, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .fab:hover {
      transform: scale(1.1) rotate(90deg);
    }

    .fab:active {
      transform: scale(0.95);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 60px;
      margin-bottom: 15px;
      opacity: 0.3;
    }

    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }

      .container {
        padding-bottom: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <div class="header-actions">
        <button class="icon-btn" onclick="verHistorial()">📋</button>
        <button class="icon-btn" onclick="eliminarTodo()">🗑️</button>
        <button class="icon-btn">
          <span>🔄</span>
          <span class="badge" id="changesBadge">5</span>
        </button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <div class="action-card" onclick="configurar()">
        <div class="action-icon">⚙️</div>
        <div class="action-label">Generar</div>
      </div>
      <div class="action-card" onclick="generarPDF()">
        <div class="action-icon">📄</div>
        <div class="action-label">PDF</div>
      </div>
    </div>

    <!-- Info Card -->
    <div class="info-card">
      <div class="info-row">
        <div class="info-label">Fecha</div>
        <div class="info-value" id="fecha">8/4/2025</div>
      </div>
      <div class="info-row">
        <div class="info-label">Hora</div>
        <div class="info-value" id="hora">9:37:32</div>
      </div>
    </div>

    <!-- Client Selection -->
    <div class="client-selector">
      <label>Cliente</label>
      <select id="clienteSelect">
        <option value="">Seleccionar cliente...</option>
        <option value="ING Juan Salas" selected>ING Juan Salas</option>
        <option value="María López">María López</option>
        <option value="Carlos Ramírez">Carlos Ramírez</option>
      </select>
    </div>

    <!-- Product Section -->
    <div class="product-section">
      <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px;">Producto</label>
      <div class="product-grid">
        <select id="productoSelect">
          <option value="">Seleccionar producto...</option>
          <option value="Relax">Relax - $1,150.00</option>
          <option value="Premium">Premium - $2,300.00</option>
          <option value="Básico">Básico - $850.00</option>
        </select>
        <input type="number" id="cantidad" placeholder="Cant." min="1" value="1">
      </div>
      <button class="add-btn" onclick="agregarProducto()">➕ Agregar Producto</button>
    </div>

    <!-- Details Section -->
    <div class="details-section">
      <div class="details-header">
        <span class="details-title">Detalles</span>
        <span class="details-count" id="itemCount">1</span>
      </div>
      
      <div class="table-header">
        <div class="table-header-cell">Cantidad</div>
        <div class="table-header-cell">Producto</div>
      </div>

      <div id="detallesList">
        <div class="table-row">
          <div class="table-cell">1</div>
          <div class="table-cell">Relax</div>
        </div>
        <div class="table-actions">
          <button class="btn-view">VER</button>
          <button class="btn-add">AÑADIR</button>
        </div>
      </div>
    </div>

    <!-- Total Section -->
    <div class="total-section">
      <div class="total-label">Total</div>
      <div class="total-amount">$<span id="totalAmount">1,150.00</span></div>
    </div>
  </div>

  <!-- FAB Button -->
  <button class="fab" onclick="nuevaCotizacion()">✏️</button>

  <script>
    // Productos disponibles con precios
    const productos = {
      'Relax': 1150.00,
      'Premium': 2300.00,
      'Básico': 850.00
    };

    let detalles = [
      { cantidad: 1, producto: 'Relax', precio: 1150.00 }
    ];

    // Actualizar fecha y hora
    function actualizarFechaHora() {
      const ahora = new Date();
      document.getElementById('fecha').textContent = 
        `${ahora.getDate()}/${ahora.getMonth() + 1}/${ahora.getFullYear()}`;
      document.getElementById('hora').textContent = ahora.toLocaleTimeString('es-ES');
    }

    // Agregar producto
    function agregarProducto() {
      const productoSelect = document.getElementById('productoSelect');
      const cantidadInput = document.getElementById('cantidad');
      
      const producto = productoSelect.value;
      const cantidad = parseInt(cantidadInput.value) || 1;

      if (!producto) {
        alert('⚠️ Selecciona un producto');
        return;
      }

      const precio = productos[producto];
      detalles.push({ cantidad, producto, precio });

      // Limpiar inputs
      productoSelect.selectedIndex = 0;
      cantidadInput.value = 1;

      renderDetalles();
    }

    // Renderizar detalles
    function renderDetalles() {
      const lista = document.getElementById('detallesList');
      const itemCount = document.getElementById('itemCount');
      const totalAmount = document.getElementById('totalAmount');

      itemCount.textContent = detalles.length;

      if (detalles.length === 0) {
        lista.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <p>No hay productos agregados</p>
          </div>
        `;
        totalAmount.textContent = '0.00';
        return;
      }

      let total = 0;
      lista.innerHTML = detalles.map((item, index) => {
        total += item.cantidad * item.precio;
        return `
          <div class="table-row">
            <div class="table-cell">${item.cantidad}</div>
            <div class="table-cell">${item.producto}</div>
          </div>
          <div class="table-actions">
            <button class="btn-view" onclick="verDetalle(${index})">VER</button>
            <button class="btn-add" onclick="eliminarDetalle(${index})" style="color: var(--danger);">ELIMINAR</button>
          </div>
        `;
      }).join('');

      totalAmount.textContent = total.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Ver detalle
    function verDetalle(index) {
      const item = detalles[index];
      alert(`Producto: ${item.producto}\nCantidad: ${item.cantidad}\nPrecio unitario: $${item.precio.toFixed(2)}\nSubtotal: $${(item.cantidad * item.precio).toFixed(2)}`);
    }

    // Eliminar detalle
    function eliminarDetalle(index) {
      if (confirm('¿Eliminar este producto?')) {
        detalles.splice(index, 1);
        renderDetalles();
      }
    }

    // Generar PDF
    function generarPDF() {
      const cliente = document.getElementById('clienteSelect').value;
      if (!cliente) {
        alert('⚠️ Selecciona un cliente primero');
        return;
      }
      if (detalles.length === 0) {
        alert('⚠️ Agrega al menos un producto');
        return;
      }
      alert('📄 Generando PDF...\n\n(Aquí integrarías jsPDF o una librería similar)');
    }

    // Nueva cotización
    function nuevaCotizacion() {
      if (confirm('¿Crear nueva cotización? Se perderán los datos actuales.')) {
        detalles = [];
        document.getElementById('clienteSelect').selectedIndex = 0;
        document.getElementById('productoSelect').selectedIndex = 0;
        document.getElementById('cantidad').value = 1;
        renderDetalles();
      }
    }

    // Eliminar todo
    function eliminarTodo() {
      if (confirm('¿Eliminar toda la cotización?')) {
        nuevaCotizacion();
      }
    }

    // Ver historial
    function verHistorial() {
      alert('📋 Historial de cotizaciones\n\n(Aquí mostrarías el historial guardado)');
    }

    // Configurar
    function configurar() {
      alert('⚙️ Configuración\n\n(Aquí irían las opciones de configuración)');
    }

    // Inicializar
    actualizarFechaHora();
    setInterval(actualizarFechaHora, 1000);
    renderDetalles();
  </script>
</body>
</html>
